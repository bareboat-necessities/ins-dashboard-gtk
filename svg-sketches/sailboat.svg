<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 128 128"
  role="img"
  aria-label="Sailboat icon">
  <g
    fill="none"
    stroke="#f8fbff"
    stroke-linecap="round"
    stroke-linejoin="round">
    <!-- mast -->
    <path
      d="M64 20v68"
      stroke-width="6" />

    <!-- port sail -->
    <path
      d="M60 26L31 82h29z"
      fill="#f8fbff"
      stroke-width="4" />

    <!-- starboard sail -->
    <path
      d="M69 31l28 51H69z"
      fill="#f8fbff"
      stroke-width="4" />

    <!-- hull -->
    <path
      d="M25 89c10 12 24 18 39 18s29-6 39-18H25z"
      fill="#f8fbff"
      stroke-width="4" />

    <!-- hull cut/detail -->
    <path
      d="M42 94c7 4 14 6 22 6s15-2 22-6"
      stroke="#0a2550"
      stroke-width="4" />

    <!-- keel / center reference -->
    <path
      d="M64 88v20"
      stroke="#0a2550"
      stroke-width="3" />
  </g>
</svg>
